<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nivi 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe4f0 0%, #ffd6e8 30%, #ffcce4 60%, #fce4ec 100%);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .heart-float {
    position: absolute;
    bottom: -60px;
    font-size: 1.5rem;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-110vh) rotate(30deg); opacity: 0; }
  }

  /* Sparkles */
  .sparkle {
    position: fixed;
    font-size: 1.2rem;
    pointer-events: none;
    animation: sparkleAnim 2s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes sparkleAnim {
    0% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
    100% { opacity: 1; transform: scale(1.3) rotate(20deg); }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(18px);
    border: 2px solid rgba(255,182,206,0.5);
    border-radius: 40px;
    padding: 40px 48px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 20px 60px rgba(255,100,150,0.18), 0 4px 20px rgba(255,100,150,0.1);
    max-width: 520px;
    width: 92vw;
    transition: box-shadow 0.3s;
  }

  /* ─── TEDDIES ─── */
  .teddy-stage {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0px;
    margin-bottom: 10px;
    position: relative;
    height: 200px;
    width: 100%;
  }

  /* Speech bubble */
  .bubble {
    position: absolute;
    top: 0px;
    left: 50%;
    transform: translateX(-70%);
    background: #fff;
    border: 2px solid #ffb3cc;
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 0.82rem;
    font-weight: 700;
    color: #d63384;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(255,100,150,0.15);
    animation: bubblePop 0.5s cubic-bezier(.36,.07,.19,.97) both, bobble 3s ease-in-out infinite 0.5s;
    z-index: 5;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 48px;
    border: 6px solid transparent;
    border-top-color: #ffb3cc;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -9px;
    left: 49px;
    border: 5px solid transparent;
    border-top-color: #fff;
    z-index: 1;
  }
  @keyframes bubblePop {
    0%   { opacity:0; transform: translateX(-70%) scale(0.6); }
    100% { opacity:1; transform: translateX(-70%) scale(1); }
  }
  @keyframes bobble {
    0%,100% { transform: translateX(-70%) translateY(0); }
    50%      { transform: translateX(-70%) translateY(-5px); }
  }

  /* SVG teddies */
  .teddy {
    width: 130px;
    height: 160px;
    flex-shrink: 0;
  }
  #teddy-male {
    animation: bounceMale 2.5s ease-in-out infinite;
  }
  #teddy-female {
    animation: bounceFemale 2.5s ease-in-out infinite 0.4s;
  }
  @keyframes bounceMale {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-8px) rotate(2deg); }
  }
  @keyframes bounceFemale {
    0%,100% { transform: translateY(0) rotate(2deg); }
    50%      { transform: translateY(-8px) rotate(-2deg); }
  }

  /* ─── YES STATE ─── */
  body.yes-state #teddy-male,
  body.yes-state #teddy-female {
    animation: none !important;
  }
  body.yes-state #teddy-male {
    transform-origin: right center;
    animation: hugLeft 0.6s forwards !important;
  }
  body.yes-state #teddy-female {
    transform-origin: left center;
    animation: hugRight 0.6s forwards !important;
  }
  @keyframes hugLeft {
    0%   { transform: translateX(0) rotate(-2deg); }
    100% { transform: translateX(30px) rotate(-12deg); }
  }
  @keyframes hugRight {
    0%   { transform: translateX(0) rotate(2deg); }
    100% { transform: translateX(-30px) rotate(12deg); }
  }

  /* ─── Question text ─── */
  .question-text {
    font-family: 'Pacifico', cursive;
    font-size: 1.55rem;
    color: #c2185b;
    text-align: center;
    margin: 14px 0 28px;
    line-height: 1.4;
    text-shadow: 0 2px 8px rgba(255,100,150,0.18);
    animation: fadeSlideUp 0.8s 0.3s both;
  }
  @keyframes fadeSlideUp {
    0%   { opacity:0; transform:translateY(20px); }
    100% { opacity:1; transform:translateY(0); }
  }

  /* ─── Yes message ─── */
  .yes-message {
    font-family: 'Pacifico', cursive;
    font-size: 1.4rem;
    color: #d81b60;
    text-align: center;
    margin-top: 18px;
    display: none;
    animation: popIn 0.6s cubic-bezier(.36,.07,.19,.97) both;
    text-shadow: 0 2px 12px rgba(255,100,150,0.25);
  }
  @keyframes popIn {
    0%   { opacity:0; transform:scale(0.5); }
    70%  { transform:scale(1.1); }
    100% { opacity:1; transform:scale(1); }
  }

  /* ─── Buttons ─── */
  .btn-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
    min-height: 64px;
    width: 100%;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    color: #fff;
    padding: 14px 38px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(135deg, #e91e63 0%, #f06292 50%, #c2185b 100%);
    box-shadow: 0 6px 20px rgba(233,30,99,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  .btn:active { transform: scale(0.95); }
  .btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(233,30,99,0.4), inset 0 1px 0 rgba(255,255,255,0.3); }

  /* Texture dots overlay on buttons */
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50px;
    background-image: radial-gradient(circle, rgba(255,255,255,0.18) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
  }

  #btn-no {
    position: absolute;
    /* will be repositioned by JS */
    transition: top 0.3s cubic-bezier(.36,.07,.19,.97), left 0.3s cubic-bezier(.36,.07,.19,.97);
  }

  /* heart burst on yes */
  .heart-burst {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    z-index: 999;
    animation: burstAnim 1.2s ease-out forwards;
  }
  @keyframes burstAnim {
    0%   { opacity:1; transform: translate(0,0) scale(0.5); }
    100% { opacity:0; transform: translate(var(--dx), var(--dy)) scale(1.5); }
  }
</style>
</head>
<body>

<!-- Floating hearts background -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- Sparkles -->
<span class="sparkle" style="top:8%;left:6%;animation-delay:0s">✨</span>
<span class="sparkle" style="top:15%;right:8%;animation-delay:0.7s">💫</span>
<span class="sparkle" style="bottom:12%;left:9%;animation-delay:1.2s">✨</span>
<span class="sparkle" style="bottom:20%;right:6%;animation-delay:0.3s">💫</span>
<span class="sparkle" style="top:50%;left:3%;animation-delay:1.8s">🌸</span>
<span class="sparkle" style="top:40%;right:3%;animation-delay:0.9s">🌸</span>

<div class="card">

  <!-- TEDDY STAGE -->
  <div class="teddy-stage">

    <!-- Speech bubble (male side) -->
    <div class="bubble" id="bubble">Niviiiiiiii… do you love me? 🥺</div>

    <!-- Male Teddy (brown, bow tie) -->
    <svg id="teddy-male" class="teddy" viewBox="0 0 130 160" xmlns="http://www.w3.org/2000/svg">
      <!-- ears -->
      <circle cx="28" cy="38" r="18" fill="#8B5E3C"/>
      <circle cx="28" cy="38" r="11" fill="#C49A6C"/>
      <circle cx="102" cy="38" r="18" fill="#8B5E3C"/>
      <circle cx="102" cy="38" r="11" fill="#C49A6C"/>
      <!-- head -->
      <ellipse cx="65" cy="60" rx="42" ry="40" fill="#A0693A"/>
      <!-- face highlight -->
      <ellipse cx="65" cy="68" rx="26" ry="22" fill="#C49A6C"/>
      <!-- eyes -->
      <circle cx="52" cy="52" r="7" fill="#3a1a00"/>
      <circle cx="78" cy="52" r="7" fill="#3a1a00"/>
      <circle cx="54" cy="50" r="2.5" fill="white"/>
      <circle cx="80" cy="50" r="2.5" fill="white"/>
      <!-- nose -->
      <ellipse cx="65" cy="65" rx="7" ry="5" fill="#3a1a00"/>
      <!-- mouth smile -->
      <path d="M57 72 Q65 80 73 72" stroke="#3a1a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- blush -->
      <ellipse cx="44" cy="66" rx="8" ry="5" fill="#e8a0b0" opacity="0.5"/>
      <ellipse cx="86" cy="66" rx="8" ry="5" fill="#e8a0b0" opacity="0.5"/>
      <!-- body -->
      <ellipse cx="65" cy="120" rx="36" ry="34" fill="#A0693A"/>
      <!-- belly -->
      <ellipse cx="65" cy="122" rx="22" ry="20" fill="#C49A6C"/>
      <!-- arms -->
      <ellipse cx="22" cy="108" rx="12" ry="22" fill="#A0693A" transform="rotate(-15,22,108)"/>
      <ellipse cx="108" cy="108" rx="12" ry="22" fill="#A0693A" transform="rotate(15,108,108)"/>
      <!-- legs -->
      <ellipse cx="48" cy="148" rx="13" ry="16" fill="#8B5E3C"/>
      <ellipse cx="82" cy="148" rx="13" ry="16" fill="#8B5E3C"/>
      <!-- bow tie -->
      <polygon points="55,90 65,95 55,100" fill="#e91e63"/>
      <polygon points="75,90 65,95 75,100" fill="#e91e63"/>
      <circle cx="65" cy="95" r="4" fill="#c2185b"/>
    </svg>

    <!-- Female Teddy (pink tones, bow on head) -->
    <svg id="teddy-female" class="teddy" viewBox="0 0 130 160" xmlns="http://www.w3.org/2000/svg">
      <!-- ears -->
      <circle cx="28" cy="38" r="18" fill="#d4748a"/>
      <circle cx="28" cy="38" r="11" fill="#f0a8b8"/>
      <circle cx="102" cy="38" r="18" fill="#d4748a"/>
      <circle cx="102" cy="38" r="11" fill="#f0a8b8"/>
      <!-- head -->
      <ellipse cx="65" cy="60" rx="42" ry="40" fill="#e8909a"/>
      <!-- face highlight -->
      <ellipse cx="65" cy="68" rx="26" ry="22" fill="#f5c2cc"/>
      <!-- eyes (with lashes) -->
      <circle cx="52" cy="52" r="7" fill="#3a1a00"/>
      <circle cx="78" cy="52" r="7" fill="#3a1a00"/>
      <circle cx="54" cy="50" r="2.5" fill="white"/>
      <circle cx="80" cy="50" r="2.5" fill="white"/>
      <!-- lashes -->
      <line x1="47" y1="46" x2="44" y2="42" stroke="#3a1a00" stroke-width="1.5"/>
      <line x1="52" y1="44" x2="51" y2="40" stroke="#3a1a00" stroke-width="1.5"/>
      <line x1="57" y1="46" x2="59" y2="42" stroke="#3a1a00" stroke-width="1.5"/>
      <line x1="73" y1="46" x2="71" y2="42" stroke="#3a1a00" stroke-width="1.5"/>
      <line x1="78" y1="44" x2="78" y2="40" stroke="#3a1a00" stroke-width="1.5"/>
      <line x1="83" y1="46" x2="86" y2="42" stroke="#3a1a00" stroke-width="1.5"/>
      <!-- nose -->
      <ellipse cx="65" cy="65" rx="6" ry="4.5" fill="#9b3a52"/>
      <!-- smile -->
      <path d="M57 72 Q65 80 73 72" stroke="#9b3a52" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- blush -->
      <ellipse cx="44" cy="66" rx="8" ry="5" fill="#e8607a" opacity="0.45"/>
      <ellipse cx="86" cy="66" rx="8" ry="5" fill="#e8607a" opacity="0.45"/>
      <!-- bow on head -->
      <polygon points="55,18 65,26 55,34" fill="#ff4081"/>
      <polygon points="75,18 65,26 75,34" fill="#ff4081"/>
      <circle cx="65" cy="26" r="5" fill="#f50057"/>
      <!-- body -->
      <ellipse cx="65" cy="120" rx="36" ry="34" fill="#e8909a"/>
      <!-- belly -->
      <ellipse cx="65" cy="122" rx="22" ry="20" fill="#f5c2cc"/>
      <!-- heart on belly -->
      <path d="M65 115 C65 115 57 109 57 114 C57 118 65 124 65 124 C65 124 73 118 73 114 C73 109 65 115 65 115Z" fill="#e91e63" opacity="0.7"/>
      <!-- arms -->
      <ellipse cx="22" cy="108" rx="12" ry="22" fill="#e8909a" transform="rotate(-15,22,108)"/>
      <ellipse cx="108" cy="108" rx="12" ry="22" fill="#e8909a" transform="rotate(15,108,108)"/>
      <!-- legs -->
      <ellipse cx="48" cy="148" rx="13" ry="16" fill="#d4748a"/>
      <ellipse cx="82" cy="148" rx="13" ry="16" fill="#d4748a"/>
    </svg>

  </div><!-- /teddy-stage -->

  <!-- Question text -->
  <div class="question-text" id="questionText">
    Niviiiiiiii… do you love me? 🥺💕
  </div>

  <!-- Yes message (hidden initially) -->
  <div class="yes-message" id="yesMessage">
    I know buttuuu! 😘😘😘😘😘
  </div>

  <!-- Buttons -->
  <div class="btn-row" id="btnRow">
    <button class="btn" id="btn-yes" onclick="handleYes()">Yes 💖</button>
    <button class="btn" id="btn-no"  onclick="handleNo()">No 🙈</button>
  </div>

</div><!-- /card -->

<script>
// ─── Floating hearts background ───
const bg = document.getElementById('heartsBg');
const heartEmojis = ['❤️','💕','💖','💗','💓','🌸','💝','🩷'];
for (let i = 0; i < 22; i++) {
  const h = document.createElement('span');
  h.className = 'heart-float';
  h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
  h.style.left = Math.random()*100 + 'vw';
  h.style.fontSize = (1 + Math.random()*1.5) + 'rem';
  h.style.animationDuration = (6 + Math.random()*8) + 's';
  h.style.animationDelay = (Math.random()*8) + 's';
  bg.appendChild(h);
}

// ─── NO button – random move ───
const noBtn = document.getElementById('btn-no');
const btnRow = document.getElementById('btnRow');

// Initial position reference: we'll use viewport-relative movement
let noMoved = false;
function handleNo() {
  // Move button to a random spot on screen
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const bw = noBtn.offsetWidth + 20;
  const bh = noBtn.offsetHeight + 20;
  const x = Math.random() * (vw - bw);
  const y = Math.random() * (vh - bh);
  noBtn.style.position = 'fixed';
  noBtn.style.zIndex = '999';
  noBtn.style.top = y + 'px';
  noBtn.style.left = x + 'px';
}

// Also dodge on hover/mouseover for desktop
noBtn.addEventListener('mouseover', handleNo);
noBtn.addEventListener('touchstart', function(e){
  e.preventDefault();
  handleNo();
}, {passive: false});

// ─── YES handler ───
function handleYes() {
  // State
  document.body.classList.add('yes-state');

  // Hide no button
  noBtn.style.display = 'none';
  document.getElementById('btn-yes').style.display = 'none';

  // Hide question, show yes message
  document.getElementById('questionText').style.display = 'none';
  document.getElementById('bubble').style.display = 'none';
  const yesMsg = document.getElementById('yesMessage');
  yesMsg.style.display = 'block';

  // Change bubble to kiss
  const bubble = document.getElementById('bubble');
  bubble.textContent = '😘😘😘';
  bubble.style.display = 'block';

  // Burst hearts
  for (let i = 0; i < 18; i++) {
    setTimeout(() => burstHeart(), i * 80);
  }
}

function burstHeart() {
  const h = document.createElement('span');
  h.className = 'heart-burst';
  h.textContent = ['❤️','💕','💖','💗','😘','💝'][Math.floor(Math.random()*6)];
  const sx = 30 + Math.random()*60; // start roughly center
  h.style.left = sx + 'vw';
  h.style.top  = '50vh';
  const dx = (Math.random()-0.5)*400 + 'px';
  const dy = -(80 + Math.random()*300) + 'px';
  h.style.setProperty('--dx', dx);
  h.style.setProperty('--dy', dy);
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 1300);
}
</script>
</body>
</html>
